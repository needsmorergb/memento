# Local development services for Olla.
#
#   docker compose up -d
#   pnpm --filter @workspace/db run push      # apply schema to local Postgres
#   pnpm --filter @workspace/api-server run dev
#
# Postgres → DATABASE_URL=postgres://olla:olla@localhost:5432/olla
# MinIO    → S3 API on :9000, console on :9001 (minioadmin / minioadmin)

services:
  postgres:
    image: postgres:16-alpine
    container_name: olla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: olla
      POSTGRES_PASSWORD: olla
      POSTGRES_DB: olla
    ports:
      - "5432:5432"
    volumes:
      - olla-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olla -d olla"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    container_name: olla-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - olla-minio:/data

  # One-shot: create the media bucket once MinIO is up, then exit.
  createbuckets:
    image: minio/mc:latest
    container_name: olla-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/olla-media;
      /usr/bin/mc anonymous set download local/olla-media/public;
      echo 'olla-media bucket ready';
      "

volumes:
  olla-pgdata:
  olla-minio:
