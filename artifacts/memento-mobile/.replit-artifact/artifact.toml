kind = "mobile"
previewPath = "/mobile/"
title = "Momento Mobile"
version = "1.0.0"
id = "artifacts/memento-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21780

[services.development]
run = "pnpm --filter @workspace/memento-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/memento-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/memento-mobile", "run", "serve" ]

[services.env]
PORT = "21780"
BASE_PATH = "/mobile/"
